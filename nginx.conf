server {
    listen 80;
    server_name _;          # заменишь на свой домен/IP

    client_max_body_size 10M;   # для загрузки чеков/аватарок

    # Статика — отдаётся Nginx напрямую, не трогая Django
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Медиа (аватарки, фото кафе, чеки)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Всё остальное → Gunicorn
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
