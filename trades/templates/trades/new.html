{% extends "base.html" %}
{% load level_tags %}
{% block title %}Новый обмен{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 0 auto; padding: 14px 12px;">
    <div style="font-size: 22px; font-weight: 800; margin-bottom: 8px;">Новый обмен</div>
    <div style="opacity:.7; margin-bottom: 14px;">
        С другом: <b>@{{ to_user.username }} <span class="level-badge">LVL {% user_level to_user %}</span></b>
    </div>

    {% if form.errors %}
    <div
        style="border:1px solid #ffd1d1; background:#fff3f3; padding:10px 12px; border-radius:12px; margin-bottom: 10px;">
        <b>Ошибки:</b> {{ form.errors }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn" style="width:100%;">Отправить</button>
    </form>
</div>
{% endblock %}
