{% extends 'base.html' %}
{% load static %}

{% block title %}Добавить заказ{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/add_order.css' %}">

<div class="add-order-container">

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <section class="block">
            <h2 class="block-title">Добавить чек</h2>

            <div class="upload-wrapper-big">
                <label for="check_input" class="upload-area big-upload" id="check-label">
                    <span class="plus-icon">+</span>
                </label>

                <img id="check-preview" class="preview-img" style="display:none;">

                {{ form.check_image }}
            </div>
        </section>

        <section class="block">
            <h2 class="block-title">Оставить отзыв</h2>

            <div class="review-row">

                <div class="upload-wrapper-small">
                    <label for="dish_input" class="upload-area small-upload" id="dish-label">
                        <span class="plus-icon">+</span>
                        <span class="upload-text">Фото</span>
                    </label>

                    <img id="dish-preview" class="preview-img-small" style="display:none;">

                    {{ form.dish_photo }}
                </div>

                {{ form.comment }}
            </div>
        </section>

        <section class="block">
            <h2 class="block-title">Выбрать кафе</h2>

            <div class="cafe-row">
                <label class="cafe-label" for="{{ form.cafe.id_for_label }}">Кафе</label>
                {{ form.cafe }}
            </div>
        </section>

        <div class="publish-container">
            <button type="submit" class="publish-btn">Опубликовать</button>
        </div>

    </form>
</div>

<script>
function loadPreview(input, previewId, labelId) {
    const preview = document.getElementById(previewId);
    const label = document.getElementById(labelId);

    if (input.files && input.files[0]) {
        label.style.display = "none";
        preview.style.display = "block";
        preview.src = URL.createObjectURL(input.files[0]);
    }
}

document.getElementById("check_input").addEventListener("change", function() {
    loadPreview(this, "check-preview", "check-label");
});

document.getElementById("dish_input").addEventListener("change", function() {
    loadPreview(this, "dish-preview", "dish-label");
});
</script>

{% endblock %}
