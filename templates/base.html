{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}

    <title>{% block title %}{% endblock %}</title>
</head>

<body>

    <div class="header">
        <a href="{% url 'home' %}" class="header-logo">SHARE</a>

        <button class="header-back" type="button" aria-label="Назад" onclick="window.history.back();">
          <svg class="header-back-ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

    </div>

    {% if messages %}
    <div class="message-container">
        {% for message in messages %}
            <div class="message-success">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <div style="padding-top: 72px; padding-bottom: 140px;">
        {% block content %}
        {% endblock %}
    </div>

    <div class="nav-bar">

        <a class="nav-item {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">
            <img src="{% static 'icons/feed.svg' %}" class="nav-icon">
            <span>Лента</span>
        </a>

        <a class="nav-item {% if request.path|slice:':9' == '/friends/' %}active{% endif %}"
           href="{% url 'friends:friends_page' %}">
            <img src="{% static 'icons/friends.svg' %}" class="nav-icon">
            <span>Друзья</span>
        </a>

        <a class="add-button {% if request.path|slice:':5' == '/add/' %}active{% endif %}"
           href="{% url 'add_order' %}">
            <img src="{% static 'icons/add.svg' %}" class="add-icon">
        </a>

        <a class="nav-item {% if request.path|slice:':7' == '/promo/' %}active{% endif %}"
          href="{% url 'promo:home' %}">
            <img src="{% static 'icons/promo.svg' %}" class="nav-icon">
            <span>Промо</span>
        </a>


        <a class="nav-item {% if request.path|slice:':9' == '/profile/' %}active{% endif %}"
           href="{% url 'profile_home' %}">
            <img src="{% static 'icons/profile.svg' %}" class="nav-icon">
            <span>Профиль</span>
        </a>

    </div>

</body>
</html>
