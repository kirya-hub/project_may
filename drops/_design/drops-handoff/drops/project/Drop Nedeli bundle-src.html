<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дроп недели — SHARE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <template id="__bundler_thumbnail" data-bg-color="#07060d">
    <svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
      <rect width="390" height="844" fill="#111018" rx="44"/>
      <!-- header -->
      <rect x="20" y="22" width="60" height="10" rx="5" fill="#28243e"/>
      <rect x="165" y="20" width="60" height="14" rx="7" fill="#fff" opacity="0.9"/>
      <rect x="340" y="22" width="14" height="14" rx="7" fill="#28243e"/>
      <rect x="362" y="22" width="14" height="14" rx="7" fill="#28243e"/>
      <!-- timer card -->
      <rect x="14" y="100" width="362" height="120" rx="20" fill="#15132b" stroke="#282545" stroke-width="1"/>
      <rect x="60" y="101" width="270" height="1.5" fill="url(#pg)"/>
      <circle cx="148" cy="127" r="4" fill="#4ade80"/>
      <rect x="160" y="122" width="82" height="10" rx="5" fill="#4ade80" opacity="0.5"/>
      <rect x="52" y="148" width="40" height="40" rx="8" fill="#fff" opacity="0.12"/>
      <rect x="118" y="148" width="40" height="40" rx="8" fill="#fff" opacity="0.12"/>
      <rect x="184" y="148" width="40" height="40" rx="8" fill="#fff" opacity="0.12"/>
      <rect x="250" y="148" width="40" height="40" rx="8" fill="#fff" opacity="0.12"/>
      <!-- tiers -->
      <rect x="14" y="248" width="107" height="80" rx="13" fill="#ffffff08" stroke="#1f1d32" stroke-width="1.5"/>
      <rect x="131" y="238" width="107" height="90" rx="13" fill="rgba(232,146,74,0.14)" stroke="#e8924a" stroke-width="1.5"/>
      <rect x="247" y="248" width="107" height="80" rx="13" fill="rgba(212,160,23,0.07)" stroke="#d4a01755" stroke-width="1.5"/>
      <!-- badge -->
      <rect x="157" y="231" width="56" height="14" rx="7" fill="#e8924a"/>
      <!-- bonus table rows -->
      <rect x="14" y="360" width="200" height="8" rx="4" fill="#28243e"/>
      <rect x="14" y="380" width="150" height="6" rx="3" fill="#1d1b30"/>
      <rect x="14" y="398" width="150" height="6" rx="3" fill="#1d1b30"/>
      <rect x="14" y="416" width="150" height="6" rx="3" fill="#1d1b30"/>
      <!-- button -->
      <rect x="14" y="740" width="362" height="54" rx="15" fill="#7c3aed"/>
      <!-- nav -->
      <rect x="0" y="772" width="390" height="72" fill="#0c0b16"/>
      <rect x="0" y="772" width="390" height="1" fill="#ffffff0e"/>
      <circle cx="195" cy="762" r="26" fill="#7c3aed"/>
      <defs>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="40%" stop-color="#6d28d9"/>
          <stop offset="60%" stop-color="#9d6bf8"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
    </svg>
  </template>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #07060d; font-family: 'Manrope', sans-serif; overflow: hidden; }
    #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    .scroll-view { overflow-y: auto; scrollbar-width: none; }
    .scroll-view::-webkit-scrollbar { display: none; }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.75); }
    }
    @keyframes bronze-glow {
      0%, 100% { box-shadow: 0 0 0 1.5px #e8924a, 0 0 18px rgba(232,146,74,0.28), 0 0 40px rgba(232,146,74,0.1); }
      50%       { box-shadow: 0 0 0 1.5px #f0a868, 0 0 28px rgba(232,146,74,0.48), 0 0 60px rgba(232,146,74,0.18); }
    }
    @keyframes gold-glow {
      0%, 100% { box-shadow: 0 0 0 1.5px #d4a017, 0 0 18px rgba(212,160,23,0.25), 0 0 40px rgba(212,160,23,0.08); }
      50%       { box-shadow: 0 0 0 1.5px #e0b530, 0 0 28px rgba(212,160,23,0.40), 0 0 60px rgba(212,160,23,0.15); }
    }
    @keyframes btn-shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .grab-btn {
      transition: transform 0.1s, opacity 0.12s;
      cursor: pointer;
    }
    .grab-btn:active { transform: scale(0.98); opacity: 0.88; }
    .nav-tap { cursor: pointer; transition: opacity 0.12s; }
    .nav-tap:active { opacity: 0.55; }
    .how-link { cursor: pointer; }
    .how-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ── Tweak defaults ── */
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "activeTier": "bronze",
    "accentColor": "#8b5cf6"
  }/*EDITMODE-END*/;

  /* ── Timer utils ── */
  function getTarget() {
    try {
      const s = localStorage.getItem('share_drop_v2');
      if (s) { const t = +s; if (t > Date.now()) return t; }
    } catch {}
    // 4 days 1 hour 4 minutes from now
    const t = Date.now() + (4 * 86400 + 1 * 3600 + 4 * 60) * 1000;
    try { localStorage.setItem('share_drop_v2', String(t)); } catch {}
    return t;
  }
  function timeLeft(target) {
    const d = Math.max(0, target - Date.now());
    return {
      dy: Math.floor(d / 86400000),
      hr: Math.floor((d % 86400000) / 3600000),
      mn: Math.floor((d % 3600000)  / 60000),
      sc: Math.floor((d % 60000)    / 1000),
    };
  }
  const p2 = n => String(n).padStart(2, '0');

  /* ── SVG Icons ── */
  const IcoBack = () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  );
  const IcoGift = () => (
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 12v10H4V12"/><rect x="2" y="7" width="20" height="5"/>
      <path d="M12 22V7"/>
      <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
      <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
    </svg>
  );
  const IcoBell = () => (
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  );
  const IcoHome = () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3e3a5a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  );
  const IcoPeople = () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3e3a5a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
  );
  const IcoTicket = () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3e3a5a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/>
      <line x1="9" y1="9" x2="9" y2="9.01"/><line x1="9" y1="12" x2="9" y2="12.01"/><line x1="9" y1="15" x2="9" y2="15.01"/>
    </svg>
  );
  const IcoUser = () => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3e3a5a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  );
  const IcoArrow = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  );

  /* ── Header ── */
  const Header = () => (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '13px 18px 13px',
      borderBottom: '1px solid rgba(255,255,255,0.055)',
      flexShrink: 0,
    }}>
      <button style={{ background: 'none', border: 'none', color: '#7872a0', cursor: 'pointer', padding: '2px 2px', display: 'flex', alignItems: 'center' }}>
        <IcoBack />
      </button>
      <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: '0.2em', color: '#fff' }}>SHARE</span>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', color: '#7872a0' }}>
        <div style={{ position: 'relative', cursor: 'pointer', display: 'flex' }}>
          <IcoGift />
          <div style={{ position: 'absolute', top: -1, right: -2, width: 7, height: 7, background: '#ef4444', borderRadius: '50%', border: '1.5px solid #111018' }} />
        </div>
        <div style={{ cursor: 'pointer', display: 'flex' }}><IcoBell /></div>
      </div>
    </div>
  );

  /* ── Timer ── */
  const TimerUnit = ({ val, label }) => (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flex: 1 }}>
      <span style={{
        fontSize: 46, fontWeight: 900, color: '#fff', lineHeight: 1,
        letterSpacing: '-2px', fontVariantNumeric: 'tabular-nums',
      }}>{p2(val)}</span>
      <span style={{
        fontSize: 9, fontWeight: 700, color: '#4e4870',
        letterSpacing: '0.13em', textTransform: 'uppercase', marginTop: 8,
      }}>{label}</span>
    </div>
  );

  const TimerSep = () => (
    <div style={{ color: '#2c2848', fontSize: 38, fontWeight: 800, lineHeight: 1, paddingBottom: 14, flexShrink: 0, userSelect: 'none' }}>:</div>
  );

  const Timer = ({ t }) => (
    <div style={{
      margin: '0 14px 22px',
      background: 'linear-gradient(145deg, #15132b 0%, #1b1836 100%)',
      borderRadius: 20,
      border: '1px solid #282545',
      padding: '18px 16px 22px',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* purple top accent line */}
      <div style={{
        position: 'absolute', top: 0, left: '8%', right: '8%', height: 1.5,
        background: 'linear-gradient(90deg, transparent 0%, #6d28d9 35%, #9d6bf8 65%, transparent 100%)',
        borderRadius: 2,
      }} />
      {/* live indicator */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, marginBottom: 20 }}>
        <div style={{
          width: 7, height: 7, borderRadius: '50%', background: '#4ade80', flexShrink: 0,
          animation: 'live-pulse 2s ease-in-out infinite',
        }} />
        <span style={{ fontSize: 10, fontWeight: 700, color: '#4ade80', letterSpacing: '0.14em' }}>НЕДЕЛЯ АКТИВНА</span>
      </div>
      {/* digits */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
        <TimerUnit val={t.dy} label="Дней" />
        <TimerSep />
        <TimerUnit val={t.hr} label="Часов" />
        <TimerSep />
        <TimerUnit val={t.mn} label="Минут" />
        <TimerSep />
        <TimerUnit val={t.sc} label="Сек" />
      </div>
    </div>
  );

  /* ── Tier Card ── */
  const TierCard = ({ emoji, name, range, desc, active, kind }) => {
    const isBronze = kind === 'bronze';
    const isGold   = kind === 'gold';
    const borderColor = isBronze ? '#e8924a' : isGold ? '#d4a017' : '#1f1d32';
    const bg = active && isBronze
      ? 'linear-gradient(155deg, rgba(232,146,74,0.16) 0%, rgba(180,88,20,0.09) 100%)'
      : active && isGold
      ? 'linear-gradient(155deg, rgba(212,160,23,0.16) 0%, rgba(170,120,10,0.09) 100%)'
      : isGold
      ? 'linear-gradient(155deg, rgba(212,160,23,0.07) 0%, rgba(180,130,10,0.04) 100%)'
      : 'rgba(255,255,255,0.025)';
    const anim = active && isBronze ? 'bronze-glow 3s ease-in-out infinite' : active && isGold ? 'gold-glow 3s ease-in-out infinite' : 'none';
    const nameColor = active && isBronze ? '#f0a060' : active && isGold ? '#ddb030' : isGold ? '#a07820' : '#3d3856';

    return (
      <div style={{
        flex: 1, borderRadius: 13,
        padding: emoji ? '13px 9px 13px' : '13px 9px',
        background: bg,
        border: active ? 'none' : `1.5px solid ${borderColor}`,
        animation: anim,
        position: 'relative',
      }}>
        {active && (
          <div style={{
            position: 'absolute', top: -11, left: '50%', transform: 'translateX(-50%)',
            background: isBronze ? '#e8924a' : '#d4a017',
            color: '#0e0800', fontSize: 9, fontWeight: 900,
            letterSpacing: '0.05em', padding: '3px 9px', borderRadius: 100,
            whiteSpace: 'nowrap',
          }}>ВАША ЛИГА</div>
        )}
        {emoji && <div style={{ fontSize: 20, marginBottom: 7, lineHeight: 1 }}>{emoji}</div>}
        <div style={{ fontSize: 12.5, fontWeight: 800, color: nameColor, marginBottom: 3, letterSpacing: '-0.1px' }}>{name}</div>
        <div style={{
          fontSize: 10.5, fontWeight: 600, lineHeight: 1.45,
          color: active && isBronze ? 'rgba(232,146,74,0.62)' : active && isGold ? 'rgba(212,160,23,0.62)' : isGold ? '#5a4a18' : '#332f4f',
        }}>{range}</div>
        {desc && <div style={{ fontSize: 9.5, color: '#2e2b44', marginTop: 5, lineHeight: 1.5 }}>{desc}</div>}
      </div>
    );
  };

  /* ── Section label ── */
  const Lbl = ({ children, mt = 0 }) => (
    <div style={{
      fontSize: 10.5, fontWeight: 700, letterSpacing: '0.12em', color: '#3f3b5e',
      textTransform: 'uppercase', marginBottom: 11, marginTop: mt,
    }}>{children}</div>
  );

  /* ── Bonus table ── */
  const bonusRows = [
    ['1 — 3', '+0%', false],
    ['4 — 6', '+5%', true],
    ['7 — 9', '+10%', true],
    ['10 — 12', '+15%', true],
    ['13 — 14', '+18%', true],
    ['15', '+25%', true],
  ];

  const BonusTable = () => (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', paddingBottom: 9, borderBottom: '1px solid #1d1b30' }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: '#38355a', letterSpacing: '0.09em' }}>УРОВЕНЬ</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: '#38355a', letterSpacing: '0.09em' }}>БОНУС</span>
      </div>
      {bonusRows.map(([lvl, bonus, lit]) => (
        <div key={lvl} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 0', borderBottom: '1px solid rgba(255,255,255,0.035)' }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: '#8582a5' }}>{lvl}</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: lit ? '#3dd68c' : '#36325a' }}>{bonus}</span>
        </div>
      ))}
    </div>
  );

  /* ── Chances table ── */
  const ChancesTable = ({ rows }) => (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', paddingBottom: 9, borderBottom: '1px solid #1d1b30' }}>
        <span style={{ flex: 1.3, fontSize: 10, fontWeight: 700, color: '#38355a', letterSpacing: '0.09em' }}>УРОВЕНЬ</span>
        <span style={{ flex: 1, textAlign: 'center', fontSize: 12, fontWeight: 600, color: '#b8b4d0' }}>Common</span>
        <span style={{ flex: 1, textAlign: 'right', fontSize: 12, fontWeight: 600, color: '#a78bfa' }}>Rare</span>
      </div>
      {rows.map(([lvl, common, rare]) => (
        <div key={lvl} style={{ display: 'flex', alignItems: 'center', padding: '9px 0', borderBottom: '1px solid rgba(255,255,255,0.035)' }}>
          <span style={{ flex: 1.3, fontSize: 13, fontWeight: 500, color: '#8582a5' }}>{lvl}</span>
          <span style={{ flex: 1, textAlign: 'center', fontSize: 13, fontWeight: 600, color: '#c0bdd8' }}>{common}</span>
          <span style={{ flex: 1, textAlign: 'right', fontSize: 13, fontWeight: 700, color: '#a78bfa' }}>{rare}</span>
        </div>
      ))}
    </div>
  );

  const bronzeChances = [['1 — 6', '85%', '15%'], ['7 — 12', '75%', '25%'], ['13 — 15', '65%', '35%']];
  const goldChances   = [['1 — 6', '70%', '30%'], ['7 — 12', '55%', '45%'], ['13 — 15', '40%', '60%']];

  /* ── Nav bar ── */
  const NavBar = () => (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, height: 72,
      background: '#0c0b16', borderTop: '1px solid rgba(255,255,255,0.055)',
      display: 'flex', alignItems: 'center', padding: '0 6px 8px', zIndex: 20,
    }}>
      {[
        { icon: <IcoHome />, label: 'Лента' },
        { icon: <IcoPeople />, label: 'Друзья' },
        { center: true },
        { icon: <IcoTicket />, label: 'Промо' },
        { icon: <IcoUser />, label: 'Профиль' },
      ].map((item, i) => (
        <div key={i} className="nav-tap" style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          {item.center ? (
            <div style={{
              width: 52, height: 52, borderRadius: '50%',
              background: 'linear-gradient(140deg, #7c3aed, #9d60f8)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              marginTop: -18,
              boxShadow: '0 4px 24px rgba(124,58,237,0.50)',
            }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.6" strokeLinecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </div>
          ) : (
            <>
              {item.icon}
              <span style={{ fontSize: 9.5, color: '#3e3a5a', fontWeight: 600, letterSpacing: '0.01em' }}>{item.label}</span>
            </>
          )}
        </div>
      ))}
    </div>
  );

  /* ── Grab button ── */
  const GrabButton = ({ accent }) => (
    <div style={{
      position: 'absolute', bottom: 72, left: 0, right: 0,
      padding: '18px 16px 12px',
      background: 'linear-gradient(to top, #111018 55%, rgba(17,16,24,0) 100%)',
      zIndex: 15,
    }}>
      <button className="grab-btn" style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        width: '100%', padding: '17px 24px',
        background: `linear-gradient(130deg, ${accent}cc 0%, ${accent} 50%, ${accent}dd 100%)`,
        border: 'none', borderRadius: 15,
        color: '#fff', fontSize: 17, fontWeight: 800,
        fontFamily: "'Manrope', sans-serif",
        letterSpacing: '0.01em',
        boxShadow: `0 8px 32px ${accent}55, 0 2px 10px rgba(0,0,0,0.35)`,
      }}>
        Забрать дроп <IcoArrow />
      </button>
    </div>
  );

  /* ── Main App ── */
  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [target]       = useState(getTarget);
    const [tl, setTl]    = useState(() => timeLeft(target));

    useEffect(() => {
      const id = setInterval(() => setTl(timeLeft(target)), 1000);
      return () => clearInterval(id);
    }, [target]);

    const tier      = t.activeTier;
    const accent    = t.accentColor;

    return (
      <div style={{ width: '100vw', height: '100vh', display: 'flex', justifyContent: 'center', alignItems: 'center', background: '#07060d' }}>
        {/* Phone frame */}
        <div style={{
          width: 390, height: 844, background: '#111018', borderRadius: 44,
          overflow: 'hidden', position: 'relative',
          boxShadow: '0 0 0 1px #28243e, 0 60px 120px rgba(0,0,0,0.95)',
        }}>
          <Header />

          {/* Scrollable content */}
          <div className="scroll-view" style={{ position: 'absolute', top: 52, bottom: 72, left: 0, right: 0 }}>
            {/* Title block */}
            <div style={{ padding: '22px 18px 6px' }}>
              <div style={{ marginBottom: 9 }}>
                <h1 style={{ fontSize: 28, fontWeight: 900, color: '#fff', letterSpacing: '-0.6px', lineHeight: 1 }}>
                  Дроп недели
                </h1>
              </div>
              <p style={{ fontSize: 13, color: '#5a5478', lineHeight: 1.55, marginBottom: 20 }}>
                Сделай покупки на большую сумму, попади в лигу и получи бесплатный промокод
              </p>
            </div>

            {/* Timer */}
            <Timer t={tl} />

            {/* Content sections */}
            <div style={{ padding: '0 14px 24px' }}>

              {/* Tiers */}
              <Lbl>Лиги недели</Lbl>
              <div style={{ display: 'flex', gap: 8, paddingTop: 14, marginBottom: 28 }}>
                <TierCard
                  name="Нет тира"
                  range="< 500₽ в неделю"
                  desc="Дроп не генерируется"
                  active={tier === 'none'}
                  kind="none"
                />
                <TierCard emoji="🔥" name="Bronze" range="500 — 1999₽" active={tier === 'bronze'} kind="bronze" />
                <TierCard emoji="🥇" name="Gold"   range="2000₽+"      active={tier === 'gold'}   kind="gold" />
              </div>

              {/* Bonus table */}
              <Lbl>Бонус уровня к сумме чеков</Lbl>
              <div style={{ marginBottom: 28 }}><BonusTable /></div>

              {/* Bronze chances */}
              <Lbl>🔥 Bronze — шансы купонов</Lbl>
              <div style={{ marginBottom: 28 }}><ChancesTable rows={bronzeChances} /></div>

              {/* Gold chances */}
              <Lbl>🥇 Gold — шансы купонов</Lbl>
              <div style={{ marginBottom: 8 }}><ChancesTable rows={goldChances} /></div>

              {/* Spacer above sticky button */}
              <div style={{ height: 96 }} />
            </div>
          </div>

          <GrabButton accent={accent} />
          <NavBar />

          {/* Tweaks panel */}
          <TweaksPanel>
            <TweakSection label="Текущая лига" />
            <TweakRadio
              label="Активная лига"
              value={tier}
              options={['none', 'bronze', 'gold']}
              onChange={v => setTweak('activeTier', v)}
            />
            <TweakSection label="Цвет кнопки" />
            <TweakColor
              label="Акцент"
              value={accent}
              options={['#8b5cf6', '#2563eb', '#0ea5e9', '#059669']}
              onChange={v => setTweak('accentColor', v)}
            />
          </TweaksPanel>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
