{% extends "base.html" %}
{% load static %}

{% block title %}Лента{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/feed.css' %}">
{% endblock %}

{% block content %}

<div class="feed">
  {% for o in orders %}
    {% include "feed/_post_card.html" with o=o %}
  {% empty %}
    <div class="empty">Пока нет публикаций. Добавь первый заказ 🙂</div>
  {% endfor %}
</div>

{% endblock %}
