services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${PG_NAME:-project_may}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: db # внутри Docker сети — имя сервиса, не localhost
      PG_PORT: 5432
    volumes:
      - static_files:/app/staticfiles
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    # При первом запуске применит миграции, потом стартанёт Gunicorn
    command: >
      sh -c "python manage.py migrate --noinput &&
             GUNICORN_CMD_ARGS='--bind=0.0.0.0:8000' gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web

volumes:
  pg_data:
  static_files:
